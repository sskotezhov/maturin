basePath: /api/v1
definitions:
  auth.authResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/auth.userResponse'
    type: object
  auth.forgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  auth.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  auth.logoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  auth.refreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  auth.registerRequest:
    properties:
      email:
        type: string
    type: object
  auth.resendVerificationRequest:
    properties:
      email:
        type: string
    type: object
  auth.resetPasswordRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        type: string
    type: object
  auth.userResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      role:
        type: string
    type: object
  auth.verifyEmailRequest:
    properties:
      code:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  order.addItemRequest:
    properties:
      comment:
        type: string
      price_snapshot:
        type: number
      product_code:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  order.approveRequest:
    properties:
      total_price:
        type: number
    type: object
  order.messageResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      order_id:
        type: integer
      text:
        type: string
      user_id:
        type: integer
    type: object
  order.orderItemResponse:
    properties:
      comment:
        type: string
      id:
        type: integer
      price_snapshot:
        type: number
      product_code:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  order.orderResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/order.orderItemResponse'
        type: array
      status:
        type: string
      total_price:
        type: number
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  order.sendMessageRequest:
    properties:
      text:
        type: string
    type: object
  order.updateItemRequest:
    properties:
      comment:
        type: string
      quantity:
        type: integer
    type: object
  product.Category:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  product.ListResult:
    properties:
      items:
        items:
          $ref: '#/definitions/product.Product'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  product.Product:
    properties:
      article:
        type: string
      category_key:
        type: string
      category_name:
        type: string
      code:
        type: string
      full_name:
        type: string
      id:
        type: string
      in_stock:
        type: boolean
      name:
        type: string
      price:
        type: number
      price_date:
        type: string
      stock_qty:
        type: integer
      type:
        type: string
      updated_at:
        type: string
      vat:
        type: string
    type: object
  staff.cacheRefreshResponse:
    properties:
      categories_count:
        type: integer
      products_count:
        type: integer
      refreshed_at:
        type: string
    type: object
  staff.changeRoleRequest:
    properties:
      role:
        type: string
    type: object
  staff.clientDetailsResponse:
    properties:
      client:
        $ref: '#/definitions/staff.clientView'
      orders:
        items:
          $ref: '#/definitions/staff.orderView'
        type: array
      orders_count:
        type: integer
    type: object
  staff.clientListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/staff.clientView'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  staff.clientView:
    properties:
      comment:
        type: string
      company_name:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        type: string
      id:
        type: integer
      inn:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      phone:
        type: string
      role:
        type: string
      telegram:
        type: string
      updated_at:
        type: string
    type: object
  staff.dashboardResponse:
    properties:
      orders_by_status:
        additionalProperties:
          type: integer
        type: object
      stale_submitted_count:
        type: integer
    type: object
  staff.orderItemView:
    properties:
      comment:
        type: string
      id:
        type: integer
      price_snapshot:
        type: number
      product_code:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  staff.orderView:
    properties:
      created_at:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/staff.orderItemView'
        type: array
      status:
        type: string
      total_price:
        type: number
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  user.profileResponse:
    properties:
      company_name:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      inn:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      phone:
        type: string
      role:
        type: string
      telegram:
        type: string
    type: object
  user.updateProfileRequest:
    properties:
      mask:
        items:
          type: string
        type: array
      values:
        additionalProperties:
          type: string
        type: object
    type: object
host: матурин15.рф
info:
  contact: {}
  description: B2B platform REST API
  title: Maturin API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send password reset code
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.logoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send email verification code
      tags:
      - auth
  /auth/resend-verification:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.resendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Resend email verification code
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email, code and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reset password with code
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email, verification code and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.verifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify email and complete registration
      tags:
      - auth
  /cart:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.orderResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current draft cart
      tags:
      - cart
  /cart/items:
    post:
      consumes:
      - application/json
      parameters:
      - description: Item details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.addItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.orderResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add item to cart
      tags:
      - cart
  /cart/items/{id}:
    delete:
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete cart item
      tags:
      - cart
    patch:
      consumes:
      - application/json
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Quantity and comment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.updateItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.orderResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update cart item
      tags:
      - cart
  /cart/submit:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.orderResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Submit cart (draft → submitted)
      tags:
      - cart
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/product.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List categories
      tags:
      - products
  /orders:
    get:
      parameters:
      - description: Filter by status (draft, submitted, approved, cancelled)
        in: query
        name: status
        type: string
      - description: Filter by client user ID (manager/admin only)
        in: query
        name: user_id
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.orderResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List orders
      tags:
      - orders
  /orders/{id}:
    delete:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cancel order (client only, before approved)
      tags:
      - orders
    get:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.orderResponse'
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get order details
      tags:
      - orders
  /orders/{id}/approve:
    post:
      consumes:
      - application/json
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: Final price
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.approveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.orderResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Approve order and set final price (manager/admin)
      tags:
      - orders
  /orders/{id}/messages:
    get:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.messageResponse'
            type: array
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get order chat messages
      tags:
      - orders
    post:
      consumes:
      - application/json
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: Message text
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.sendMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/order.messageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send message to order chat
      tags:
      - orders
  /products:
    get:
      parameters:
      - description: Поиск по названию, артикулу, коду
        in: query
        name: q
        type: string
      - description: GUID категории
        in: query
        name: category
        type: string
      - description: 'Тип: Запас | Услуга'
        in: query
        name: type
        type: string
      - description: Только в наличии
        in: query
        name: in_stock
        type: boolean
      - description: Только с ценой
        in: query
        name: has_price
        type: boolean
      - description: Минимальная цена
        in: query
        name: min_price
        type: number
      - description: Максимальная цена
        in: query
        name: max_price
        type: number
      - description: 'Сортировка: name | price | code | updated_at (default: name)'
        in: query
        name: sort
        type: string
      - description: 'Направление: asc | desc (default: asc)'
        in: query
        name: sort_dir
        type: string
      - description: 'Страница (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Кол-во на странице (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/product.ListResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List products
      tags:
      - products
  /products/{id}:
    get:
      parameters:
      - description: Product GUID (Ref_Key)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/product.Product'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get product by ID
      tags:
      - products
  /staff/cache/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/staff.cacheRefreshResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Refresh 1C catalog cache (admin only)
      tags:
      - staff
  /staff/clients:
    get:
      parameters:
      - description: Search across email/name/company/phone/inn/telegram
        in: query
        name: q
        type: string
      - description: Filter by role (client/manager/admin)
        in: query
        name: role
        type: string
      - description: Filter by email_verified
        in: query
        name: email_verified
        type: boolean
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Limit (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/staff.clientListResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List/search clients (manager/admin)
      tags:
      - staff
  /staff/clients/{id}:
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/staff.clientDetailsResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
