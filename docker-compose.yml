services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s    # проверять каждые 5 секунд
      timeout: 5s     # ждать ответа не дольше 5 секунд
      retries: 5      # после 5 неудач — считать сервис unhealthy

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Go API) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend   # директория с Dockerfile
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Переопределяем значения из config.yaml через env vars.
      # В Docker сеть — имена сервисов, не localhost.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy   # ждём пока postgres не пройдёт healthcheck
      redis:
        condition: service_healthy   # ждём пока redis не пройдёт healthcheck

# ─── Именованные volumes ────────────────────────────────────────────────────
# Docker управляет этими директориями. Данные живут независимо от контейнеров.
volumes:
  postgres_data:
  redis_data:
