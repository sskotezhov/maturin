worker_processes 2;          # по одному на ядро
worker_rlimit_nofile 2048;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Rate limiting: 20 req/s с одного IP
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=20r/s;
    # Auth эндпоинты: 5 req/s (защита от брутфорса)
    limit_req_zone  $binary_remote_addr zone=auth:5m  rate=5r/s;
    # Не более 20 одновременных соединений с одного IP
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    server_tokens off;

    upstream backend {
        server backend:8080;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        ssl_certificate     /etc/letsencrypt/live/xn--15-6kc6asitpj.xn--p1ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xn--15-6kc6asitpj.xn--p1ai/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size  1m;
        client_body_timeout   10s;
        client_header_timeout 10s;
        keepalive_timeout     30s;
        send_timeout          10s;

        limit_conn conn 20;

        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-Frame-Options         "DENY"                            always;
        add_header X-XSS-Protection        "1; mode=block"                   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /swagger/ {
            limit_req zone=api burst=40 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location / {
            limit_req zone=api burst=40 nodelay;
            limit_req_status 429;

            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
